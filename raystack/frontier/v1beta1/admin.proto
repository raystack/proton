syntax = "proto3";

package raystack.frontier.v1beta1;

import "google/api/field_behavior.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "raystack/frontier/v1beta1/models.proto";
import "validate/validate.proto";

option go_package = "github.com/raystack/proton/frontier/v1beta1;frontierv1beta1";
option java_outer_classname = "Frontier";
option java_package = "io.raystack.proton.frontier.v1beta1";

service AdminService {
  // Users
  rpc ListAllUsers(ListAllUsersRequest) returns (ListAllUsersResponse) {
  }

  rpc ListAllServiceUsers(ListAllServiceUsersRequest) returns (ListAllServiceUsersResponse) {
  }

  // Group
  rpc ListGroups(ListGroupsRequest) returns (ListGroupsResponse) {
  }

  // Organizations
  rpc ListAllOrganizations(ListAllOrganizationsRequest) returns (ListAllOrganizationsResponse) {
  }

  rpc AdminCreateOrganization(AdminCreateOrganizationRequest) returns (AdminCreateOrganizationResponse) {
  }

  rpc SearchOrganizations(SearchOrganizationsRequest) returns (SearchOrganizationsResponse) {
  }

  rpc SearchOrganizationUsers(SearchOrganizationUsersRequest) returns (SearchOrganizationUsersResponse) {
  }

  rpc SearchProjectUsers(SearchProjectUsersRequest) returns (SearchProjectUsersResponse) {
  }

  rpc SearchOrganizationProjects(SearchOrganizationProjectsRequest) returns (SearchOrganizationProjectsResponse) {
  }

  rpc SearchOrganizationInvoices(SearchOrganizationInvoicesRequest) returns (SearchOrganizationInvoicesResponse) {
  }

  rpc SearchOrganizationTokens(SearchOrganizationTokensRequest) returns (SearchOrganizationTokensResponse) {
  }

  rpc SearchOrganizationServiceUserCredentials(SearchOrganizationServiceUserCredentialsRequest) returns (SearchOrganizationServiceUserCredentialsResponse) {
  }

  rpc SearchOrganizationServiceUsers(SearchOrganizationServiceUsersRequest) returns (SearchOrganizationServiceUsersResponse) {
  }

  // buf:lint:ignore RPC_RESPONSE_STANDARD_NAME
  // buf:lint:ignore RPC_REQUEST_RESPONSE_UNIQUE
  rpc ExportOrganizations(ExportOrganizationsRequest) returns (stream google.api.HttpBody) {
  }

  // buf:lint:ignore RPC_RESPONSE_STANDARD_NAME
  // buf:lint:ignore RPC_REQUEST_RESPONSE_UNIQUE
  rpc ExportOrganizationUsers(ExportOrganizationUsersRequest) returns (stream google.api.HttpBody) {
  }

  // buf:lint:ignore RPC_RESPONSE_STANDARD_NAME
  // buf:lint:ignore RPC_REQUEST_RESPONSE_UNIQUE
  rpc ExportOrganizationProjects(ExportOrganizationProjectsRequest) returns (stream google.api.HttpBody) {
  }

  // buf:lint:ignore RPC_RESPONSE_STANDARD_NAME
  // buf:lint:ignore RPC_REQUEST_RESPONSE_UNIQUE
  rpc ExportOrganizationTokens(ExportOrganizationTokensRequest) returns (stream google.api.HttpBody) {
  }

  // buf:lint:ignore RPC_RESPONSE_STANDARD_NAME
  // buf:lint:ignore RPC_REQUEST_RESPONSE_UNIQUE
  rpc ExportUsers(ExportUsersRequest) returns (stream google.api.HttpBody) {
  }

  rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse) {
  }

  rpc SearchUserOrganizations(SearchUserOrganizationsRequest) returns (SearchUserOrganizationsResponse) {
  }

  rpc SearchUserProjects(SearchUserProjectsRequest) returns (SearchUserProjectsResponse) {
  }

  rpc SetOrganizationKyc(SetOrganizationKycRequest) returns (SetOrganizationKycResponse) {
  }

  rpc ListOrganizationsKyc(ListOrganizationsKycRequest) returns (ListOrganizationsKycResponse) {
  }

  // Projects
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse) {
  }

  // Relations
  rpc ListRelations(ListRelationsRequest) returns (ListRelationsResponse) {
  }

  // Resources
  rpc ListResources(ListResourcesRequest) returns (ListResourcesResponse) {
  }

  // Roles
  rpc CreateRole(CreateRoleRequest) returns (CreateRoleResponse) {
  }

  rpc UpdateRole(UpdateRoleRequest) returns (UpdateRoleResponse) {
  }

  rpc DeleteRole(DeleteRoleRequest) returns (DeleteRoleResponse) {
  }

  // Permissions
  rpc CreatePermission(CreatePermissionRequest) returns (CreatePermissionResponse) {
  }

  rpc UpdatePermission(UpdatePermissionRequest) returns (UpdatePermissionResponse) {
  }

  rpc DeletePermission(DeletePermissionRequest) returns (DeletePermissionResponse) {
  }

  // Preferences
  rpc ListPreferences(ListPreferencesRequest) returns (ListPreferencesResponse) {
  }
  rpc CreatePreferences(CreatePreferencesRequest) returns (CreatePreferencesResponse) {
  }

  // Check
  rpc CheckFederatedResourcePermission(CheckFederatedResourcePermissionRequest) returns (CheckFederatedResourcePermissionResponse) {
  }

  // Platform
  rpc AddPlatformUser(AddPlatformUserRequest) returns (AddPlatformUserResponse) {
  }

  rpc ListPlatformUsers(ListPlatformUsersRequest) returns (ListPlatformUsersResponse) {
  }

  rpc RemovePlatformUser(RemovePlatformUserRequest) returns (RemovePlatformUserResponse) {
  }

  // Checkout
  rpc DelegatedCheckout(DelegatedCheckoutRequest) returns (DelegatedCheckoutResponse) {
  }

  rpc ListAllInvoices(ListAllInvoicesRequest) returns (ListAllInvoicesResponse) {
  }

  rpc GenerateInvoices(GenerateInvoicesRequest) returns (GenerateInvoicesResponse) {
  }

  rpc ListAllBillingAccounts(ListAllBillingAccountsRequest) returns (ListAllBillingAccountsResponse) {
  }

  // Usage
  rpc RevertBillingUsage(RevertBillingUsageRequest) returns (RevertBillingUsageResponse) {
  }

  // Webhooks
  rpc CreateWebhook(CreateWebhookRequest) returns (CreateWebhookResponse) {
  }

  rpc UpdateWebhook(UpdateWebhookRequest) returns (UpdateWebhookResponse) {
  }

  rpc DeleteWebhook(DeleteWebhookRequest) returns (DeleteWebhookResponse) {
  }

  rpc ListWebhooks(ListWebhooksRequest) returns (ListWebhooksResponse) {
  }

  // Billing Account
  rpc UpdateBillingAccountLimits(UpdateBillingAccountLimitsRequest) returns (UpdateBillingAccountLimitsResponse) {
    option deprecated = true;
  }

  // GetBillingAccountDetails returns the billing account details that can be updated via UpdateBillingAccountDetails
  rpc GetBillingAccountDetails(GetBillingAccountDetailsRequest) returns (GetBillingAccountDetailsResponse) {
  }

  rpc UpdateBillingAccountDetails(UpdateBillingAccountDetailsRequest) returns (UpdateBillingAccountDetailsResponse) {
  }

  // Prospects
  rpc CreateProspect(CreateProspectRequest) returns (CreateProspectResponse) {
  }

  rpc ListProspects(ListProspectsRequest) returns (ListProspectsResponse) {
  }

  rpc GetProspect(GetProspectRequest) returns (GetProspectResponse) {
  }

  rpc UpdateProspect(UpdateProspectRequest) returns (UpdateProspectResponse) {
  }

  rpc DeleteProspect(DeleteProspectRequest) returns (DeleteProspectResponse) {
  }

  rpc SearchInvoices(SearchInvoicesRequest) returns (SearchInvoicesResponse) {
  }

  // Admin Self
  rpc GetCurrentAdminUser(GetCurrentAdminUserRequest) returns (GetCurrentAdminUserResponse) {
  }

  // Returns a list of all sessions for a specific user. Admin access required.
  rpc ListUserSessions(ListUserSessionsRequest) returns (ListUserSessionsResponse) {}

  // Revoke a specific session for a specific user (admin only).
  rpc RevokeUserSession(RevokeUserSessionRequest) returns (RevokeUserSessionResponse) {}

  // Audit Records (Admin Only)
  rpc ListAuditRecords(ListAuditRecordsRequest) returns (ListAuditRecordsResponse) {}

  // buf:lint:ignore RPC_RESPONSE_STANDARD_NAME
  // buf:lint:ignore RPC_REQUEST_RESPONSE_UNIQUE
  rpc ExportAuditRecords(ExportAuditRecordsRequest) returns (stream google.api.HttpBody) {}

}

message ListAllUsersRequest {
  int32 page_size = 1 [
    (validate.rules).int32 = {
      gte: 1,
      ignore_empty: true,
    }
  ];
  int32 page_num = 2 [
    (validate.rules).int32 = {
      gte: 1,
      ignore_empty: true,
    }
  ];
  string keyword = 3 [];
  string org_id = 4 [];
  string group_id = 5 [];
  string state = 6 [];
}

message ListAllUsersResponse {
  int32 count = 1;
  repeated User users = 2;
}

message ListAllServiceUsersRequest {
}

message ListAllServiceUsersResponse {
  repeated ServiceUser service_users = 1;
}

message ListGroupsRequest {
  reserved 1;
  string org_id = 2 [];
  string state = 3 [];
}

message ListGroupsResponse {
  repeated Group groups = 1;
}

message ListAllOrganizationsRequest {
  string user_id = 1 [];
  string state = 2 [];
  int32 page_size = 3 [
    (validate.rules).int32 = {
      gte: 1,
      ignore_empty: true,
    }
  ];
  int32 page_num = 4 [
    (validate.rules).int32 = {
      gte: 1,
      ignore_empty: true,
    }
  ];
}

message ListAllOrganizationsResponse {
  repeated Organization organizations = 1;
  int32 count = 2[
      ];
}

message ListProjectsRequest {
  string org_id = 1 [];
  string state = 2 [];
}

message ListProjectsResponse {
  repeated Project projects = 1;
}

message ListRelationsRequest {
  string subject = 1 [];
  string object = 2 [];
}

message ListRelationsResponse {
  repeated Relation relations = 1;
}

message ListResourcesRequest {
  string user_id = 1 [];
  string project_id = 2 [];
  string organization_id = 3 [];
  string namespace = 4 [
    (validate.rules).string.min_len = 3
  ];
}

message ListResourcesResponse {
  repeated Resource resources = 1;
}

message CreateRoleRequest {
  RoleRequestBody body = 1;
}

message CreateRoleResponse {
  Role role = 1;
}

message UpdateRoleRequest {
  string id = 1 [
    (google.api.field_behavior) = REQUIRED
  ];
  RoleRequestBody body = 2;
}

message UpdateRoleResponse {
  Role role = 1;
}

message DeleteRoleRequest {
  string id = 1 [
    (google.api.field_behavior) = REQUIRED
  ];
}

message DeleteRoleResponse {}

message PermissionRequestBody {
  string name = 1 [
    deprecated = true
  ];
  // namespace should be in service/resource format
  string namespace = 2 [
    deprecated = true
  ];
  google.protobuf.Struct metadata = 3 [];
  string title = 4 [];

  // key is composed of three parts, 'service.resource.verb'. Where 'service.resource' works as a namespace for the 'verb'.
  // Use this instead of using name and namespace fields
  string key = 5 [];
}

message CreatePermissionRequest {
  repeated PermissionRequestBody bodies = 1;
}

message CreatePermissionResponse {
  repeated Permission permissions = 1;
}

message UpdatePermissionRequest {
  string id = 1 [(google.api.field_behavior) = REQUIRED];
  PermissionRequestBody body = 2;
}

message UpdatePermissionResponse {
  Permission permission = 1;
}

message DeletePermissionRequest {
  string id = 1;
}

message DeletePermissionResponse {}

message ListPreferencesRequest {}

message ListPreferencesResponse {
  repeated Preference preferences = 1;
}

message CreatePreferencesRequest {
  repeated PreferenceRequestBody preferences = 1;
}

message CreatePreferencesResponse {
  repeated Preference preference = 1;
}

message CheckFederatedResourcePermissionRequest {
  string subject = 1 [
    (google.api.field_behavior) = REQUIRED
  ];
  string resource = 2 [
    (google.api.field_behavior) = REQUIRED
  ];
  string permission = 3 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string.pattern = "^[A-Za-z0-9._-]+$"
  ];
}

message CheckFederatedResourcePermissionResponse {
  bool status = 1;
}

message AddPlatformUserRequest {
  string user_id = 1 [];
  string serviceuser_id = 2 [];

  string relation = 3 [
    (google.api.field_behavior) = REQUIRED
  ];
}

message AddPlatformUserResponse {}

message ListPlatformUsersRequest {}

message ListPlatformUsersResponse {
  repeated User users = 1;
  repeated ServiceUser serviceusers = 2;
}

message RemovePlatformUserRequest {
  string user_id = 1 [];
  string serviceuser_id = 2 [];
}

message RemovePlatformUserResponse {}

message DelegatedCheckoutRequest {
  string org_id = 1 [(validate.rules).string.min_len = 3];
  // DEPRECATED: billing_id will be inferred from org_id
  // ID of the billing account to update the subscription for
  string billing_id = 2 [
    deprecated = true,
    (validate.rules).string = {
      ignore_empty: true,
      uuid: true
    }
  ];

  // Subscription to create
  CheckoutSubscriptionBody subscription_body = 10;
  // Product to buy
  CheckoutProductBody product_body = 11;
}

message DelegatedCheckoutResponse {
  // subscription if created
  Subscription subscription = 1;
  // product if bought
  Product product = 2;
}

message ListAllInvoicesRequest {
  string org_id = 1;
  int32 page_size = 2 [
    (validate.rules).int32 = {
      gte: 1,
      ignore_empty: true,
    }
  ];
  int32 page_num = 3 [
    (validate.rules).int32 = {
      gte: 1,
      ignore_empty: true,
    }
  ];
}

message ListAllInvoicesResponse {
  repeated Invoice invoices = 1;
  int32 count = 2[
  ];
}

message GenerateInvoicesRequest {}

message GenerateInvoicesResponse {}

message ListAllBillingAccountsRequest {
  string org_id = 1;
}

message ListAllBillingAccountsResponse {
  repeated BillingAccount billing_accounts = 1;
}

message RevertBillingUsageRequest {
  string org_id = 1;
  // DEPRECATED
  string project_id = 2 [deprecated = true];

  // DEPRECATED: billing_id will be inferred from org_id
  string billing_id = 3 [
    deprecated = true,
    (validate.rules).string = {
      ignore_empty: true,
      uuid: true
    }
  ];

  // usage id to revert, a usage can only be allowed to revert once
  string usage_id = 4 [(validate.rules).string = {uuid: true}];

  // amount should be equal or less than the usage amount
  int64 amount = 5 [(validate.rules).int64 = {gte: 0}];
}

message RevertBillingUsageResponse {}

message WebhookRequestBody {
  // URL to send the webhook to (valid absolute URI via RFC 3986)
  string url = 1 [(validate.rules).string = {uri: true}];
  string description = 2;
  // events to subscribe to, if empty all events are subscribed
  repeated string subscribed_events = 3;
  // headers to be sent with the webhook
  map<string, string> headers = 4;
  string state = 5 [(validate.rules).string = {
    ignore_empty: true,
    in: [
      "enabled",
      "disabled"
    ]
  }];

  google.protobuf.Struct metadata = 20;
}

message CreateWebhookRequest {
  WebhookRequestBody body = 1;
}

message CreateWebhookResponse {
  Webhook webhook = 1;
}

message UpdateWebhookRequest {
  string id = 1 [
    (google.api.field_behavior) = REQUIRED
    (validate.rules).string.uuid = true
  ];
  WebhookRequestBody body = 2;
}

message UpdateWebhookResponse {
  Webhook webhook = 1;
}

message DeleteWebhookRequest {
  string id = 1 [
    (google.api.field_behavior) = REQUIRED
    (validate.rules).string.uuid = true
  ];
}

message DeleteWebhookResponse {}

message ListWebhooksRequest {}

message ListWebhooksResponse {
  repeated Webhook webhooks = 1;
}

message UpdateBillingAccountLimitsRequest {
  string org_id = 1 [(validate.rules).string = {min_len: 3}];
  string id = 2 [(validate.rules).string = {
    ignore_empty: true,
    uuid: true
  }];

  // credit_min is the minimum credit limit for the billing account
  // default is 0, negative numbers work as overdraft, positive
  // numbers work as minimum purchase limit
  int64 credit_min = 3;
}

message UpdateBillingAccountLimitsResponse {}

message GetBillingAccountDetailsRequest {
  string org_id = 1 [(validate.rules).string = {uuid: true}];
  string id = 2 [(validate.rules).string = {
    ignore_empty: true,
    uuid: true
  }];
}

message GetBillingAccountDetailsResponse {
  // credit_min is the minimum credit limit for the billing account
  // default is 0, negative numbers work as overdraft, positive
  // numbers work as minimum purchase limit
  int64 credit_min = 1;

  // due_in_days is the number of days after the invoice finalization
  // that it will be considered overdue, if set to 0, the customer will
  // be charged immediately
  int64 due_in_days = 2;
}

message UpdateBillingAccountDetailsRequest {
  string org_id = 1 [(validate.rules).string = {uuid: true}];
  string id = 2 [(validate.rules).string = {
    ignore_empty: true,
    uuid: true
  }];

  // credit_min is the minimum credit limit for the billing account
  // default is 0, negative numbers work as overdraft, positive
  // numbers work as minimum purchase limit
  int64 credit_min = 3;

  // due_in_days is the number of days after the invoice finalization
  // that it will be considered overdue, if set to 0, the customer will
  // be charged immediately
  int64 due_in_days = 4 [(validate.rules).int64 = {gte: 0}];
}

message UpdateBillingAccountDetailsResponse {}

