message UpdateProspectRequest{
  string id = 1[
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string = {min_len: 1},
    (validate.rules).string.uuid = true
  ];
  string name = 2[
    (validate.rules).string = {
      ignore_empty: true,
      pattern: "^[A-Za-z ]+$",
    }
  ];
  string email = 5[
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string = {
      min_len: 1,
      email: true,
    }
  ];
  string phone = 6[
  ];
  string activity = 7[
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string = {
      min_len: 1,
      pattern: "^[A-Za-z0-9-_]+$",
    }
  ];
  Prospect.Status status = 8 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).enum = {in: [1,2]}
  ];
  string source = 9[
    (validate.rules).string = {
      ignore_empty: true,
      pattern: "^[A-Za-z0-9-_]+$",
    }
  ];
  bool verified = 10[
  ];
  google.protobuf.Struct metadata = 11[
  ];
}

message UpdateProspectResponse{
  Prospect prospect = 1;
}

