name: Validate

on:
  - push
  - pull_request

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - run: buf lint
      - run: buf breaking --against "https://github.com/$GITHUB_REPOSITORY.git#branch=main"
